version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: unverse_redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    restart: always

  htf_agent:
    build: .
    container_name: unverse_htf_agent
    command: python htf_agent.py
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  learning_agent:
    build: .
    container_name: unverse_learning_agent
    command: python learning_agent.py
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  execution_engine:
    build: .
    container_name: unverse_execution_engine
    command: python execution_engine.py
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  telegram_agent:
    build: .
    container_name: unverse_telegram_agent
    command: python telegram_agent.py
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always
